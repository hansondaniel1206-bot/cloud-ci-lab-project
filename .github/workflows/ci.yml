name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print Python version      # <-- NEW STEP
        run: python --version

      - name: Run the app
        run: python app.py

      - name: Run test script
        run: python test_app.py